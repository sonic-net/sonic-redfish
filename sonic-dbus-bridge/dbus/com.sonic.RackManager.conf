<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  D-Bus policy for the SONiC rack manager alert/telemetry receiver.

  sonic-dbus-bridge owns com.sonic.RackManager and exposes the
  SubmitAlert / SubmitTelemetry methods that bmcweb SONiC OEM
  action routes forward to.
-->
<busconfig>

  <!-- Only root may own and send to the com.sonic.RackManager bus -->
  <policy user="root">
    <allow own="com.sonic.RackManager"/>
    <allow send_destination="com.sonic.RackManager"/>
  </policy>

  <!-- bmcweb runs as the bmcweb user and must be able to call into us -->
  <policy user="bmcweb">
    <allow send_destination="com.sonic.RackManager"/>
    <allow receive_sender="com.sonic.RackManager"/>
  </policy>

</busconfig>
